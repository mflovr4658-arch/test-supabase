<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Test Supabase</title>
</head>
<body>

<h2>รายการผู้ใช้</h2>
<ul id="user-list"></ul>

<input type="text" id="name" placeholder="ชื่อ">
<button onclick="addUser()">เพิ่ม</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseUrl = "https://wohizodunukbmxokfttj.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvaGl6b2R1bnVrYm14b2tmdHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTY1MTMsImV4cCI6MjA5MTMzMjUxM30.j33iAOsC0wl-Hn8180CoF6d-1RPBgv9AuiKuXBNE8s4";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function loadUsers() {
    const { data, error } = await supabase
      .from('users')
      .select('*');

    if (error) {
      console.log("ERROR:", error);
      return;
    }

    const list = document.getElementById("user-list");
    list.innerHTML = "";

    data.forEach(user => {
      const li = document.createElement("li");
      li.textContent = user.name;
      list.appendChild(li);
    });
  }

  async function addUser() {
    const name = document.getElementById("name").value;

    const { error } = await supabase
      .from('users')
      .insert([{ name }]);

    if (error) {
      console.log("INSERT ERROR:", error);
    }

    loadUsers();
  }

  loadUsers();
</script>

</body>
</html>
